benchmark:
  path: ../benchmarks/ethics_sandbox_outputs/latest
targets:
  - Qwen2.5-32B-Instruct
normalizers:
  - ethics_structural_normalizer
evaluators:
  - ethics_structural_judge
analysis_plugins:
  - ethics_family_consistency
  - ethics_slot_sensitivity
execution_policy:
  target_prompt_template:
    path: templates/ethics_target_scene_with_instruction.txt
    version: v1
    variable_allowlist:
      - prompt
      - formatted_choices
    helpers:
      - formatted_choices
    missing_variable_policy: warn_and_empty
execution_mode: real
auto_launch: false
