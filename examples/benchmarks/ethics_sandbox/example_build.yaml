sampling:
  realizations_per_template: 20

profiles:
  default_template_name: standard_naturalistic_v1
  templates:
    standard_naturalistic_v1:
      path: synthesis_templates/standard_naturalistic_v1.txt
      version: v1
      profile_vars:
        realization_mode: live_decision_brief
        narrative_person: second_person
        binary_decision_policy: infer_from_constraints

synthesis:
  model: Qwen2.5-32B-Instruct
  request_version: v1
  generation_defaults:
    temperature: 0.8
    max_new_tokens: 2048

validator:
  enabled: false
  template_name: realization_validator_v1
  model: Qwen2.5-32B-Instruct
  templates:
    realization_validator_v1:
      path: synthesis_templates/realization_validator_v1.txt
      version: v1
  generation_defaults:
    temperature: 0.0
    max_new_tokens: 512

validation:
  max_attempts: 2
  min_word_count: 24
  forbidden_terms:
    - test
    - benchmark
    - dilemma
    - philosophy
    - option a
    - option b
  required_slot_mentions:
    - decision_maker_role
    - setting_domain
