sandbox_template_schema_version: '2.0'
required_top_level_fields:
- template_id
- template_title
- language
- status
- source_cases
- merge_rationale
- key_moral_conflict
- deep_structure
- ethics_grounding
- narrative_grounding
- analysis_targets
- used_slots
- invariants
- forbidden_transformations
- prompt_generation_guidelines
- response_capture
used_slots_format:
  structural: list of slot references with slot_id and optional usage metadata
  narrative: list of slot references with slot_id and optional usage metadata
  perturbation: list of slot references with slot_id and optional usage metadata
slot_library_contract:
  source_of_truth: slot_library.yaml
  rule: templates declare slot usage only; slot values live in slot_library.yaml
  fixed_facts_policy: template-specific fixed facts are stored outside used_slots,
    typically in scenario_premises, deep_structure, narrative_grounding, or invariants
