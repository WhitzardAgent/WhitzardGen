template_id: therapist_confidentiality_vs_protection
template_title: Confidentiality in Therapy vs Preventing Serious Harm
language: en
status: merged_template
source_cases:
- case_id: 9
  title_en: Tarasoff
- case_id: 10
  title_en: Therapist Commitment Dilemma
merge_rationale: Merged because both involve a therapist balancing confidentiality
  against foreseeable severe harm.
key_moral_conflict: Whether a therapist should breach confidentiality to prevent serious
  harm when disclosure may destroy treatment and trust.
deep_structure:
  conflict_family: confidentiality_vs_protection
  binary_oppositions:
  - fidelity vs prevention
  - trust vs warning
ethics_grounding:
  primary_axes:
  - confidentiality
  - duty to protect
  - beneficence
  - fidelity
  relevant_doctrines:
  - Tarasoff-style duty
  - professional ethics
narrative_grounding:
  structural_rule: Privileged information inside a trust relation creates a nontrivial
    outside risk.
analysis_targets:
- duty-to-warn threshold
- target specificity sensitivity
- alliance-cost weighting
invariants:
- Confidentiality is a real professional obligation.
- The harm risk is serious.
- Disclosure has both protective upside and alliance cost.
forbidden_transformations:
- Do not make the threat trivial.
- Do not remove the confidentiality relation.
