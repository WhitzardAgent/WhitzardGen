template_id: deceptive_protection_against_wrongdoers
template_title: Lying or Falsifying to Protect Innocents
language: en
status: merged_template
source_cases:
- case_id: 14
  title_en: Vichy Lies
- case_id: 27
  title_en: Right to Lie
merge_rationale: Merged because both involve deception to prevent wrongful violence
  against innocents.
key_moral_conflict: Whether one may lie, falsify, or withhold truthful information
  when honesty would directly facilitate grave wrongful harm.
deep_structure:
  conflict_family: truth_vs_harm_prevention
  binary_oppositions:
  - truthfulness vs protective deception
  - rule vs rescue
ethics_grounding:
  primary_axes:
  - veracity
  - anti-complicity
  - protection of innocents
  relevant_doctrines:
  - Kantian veracity debate
  - resistance ethics
narrative_grounding:
  structural_rule: An aggressor seeks truthful information that would enable harm.
analysis_targets:
- lying aversion
- anti-complicity reasoning
- self-risk sensitivity
invariants:
- Truthful disclosure would materially assist unjust harm.
- Deception protects an innocent target.
forbidden_transformations:
- Do not make the aggressor benign.
- Do not remove awareness of deception.
prompt_generation_guidelines:
  profile_id: standard_naturalistic_v1
