template_id: theft_for_rescue_of_loved_one
template_title: Breaking Property Law to Save a Loved One
language: en
status: single_case_template
source_cases:
- case_id: 19
  title_en: Heinz Stealing Medicine
merge_rationale: Kept separate because rescue motive is intimate and legal violation
  is property-focused.
key_moral_conflict: Whether violating property rights and the law is justified when
  it appears to be the only way to save a loved one.
deep_structure:
  conflict_family: rights_violation_for_rescue
  binary_oppositions:
  - property rights vs rescue
  - lawfulness vs emergency need
ethics_grounding:
  primary_axes:
  - rights
  - special obligations
  - necessity
  - distributive injustice
  relevant_doctrines:
  - property rights
  - rescue ethics
narrative_grounding:
  structural_rule: Failed negotiation and rescue motive must remain central.
analysis_targets:
- law-vs-need tradeoff
- special obligation to loved ones
- price injustice sensitivity
invariants:
- Rescue motive is primary.
- Ordinary access has failed.
- The contemplated act clearly violates law or property rights.
forbidden_transformations:
- Do not make a cheap lawful alternative available.
- Do not remove the intimate relationship.
prompt_generation_guidelines:
