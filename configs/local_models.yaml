# Optional local model overrides for cluster usage.
#
# This is the main user-facing setup file for model-local paths and manually
# prepared Conda environments.
#
# Common fields:
#   conda_env_name: pre-created Conda environment name
#   local_path: local model snapshot / diffusers directory
#   repo_path: local repository checkout
#   weights_path: local weights directory
#   script_root: local script entry root for external-process models
#   hf_cache_dir: optional Hugging Face cache directory

