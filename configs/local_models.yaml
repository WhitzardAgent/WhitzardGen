# Optional local model overrides for cluster usage.
#
# Keep this file focused on machine-local deployment details only.
# If a value is already implied by `configs/models.yaml`, do not repeat it here.
#
# Typical local-only fields:
#   conda_env_name: override only when this machine uses a non-default env name
#   local_path: local model snapshot directory for simple in-process models
#   weights_path: local weights / checkpoint directory
#   repo_path: local repository checkout required by repo-based models
#   script_root: local script entry root for external-process models
#   hf_cache_dir: optional Hugging Face cache directory
#   max_gpus: machine-local cap for one model on this cluster
#
# Recommended rule:
#   - `configs/models.yaml` defines what a model is
#   - `configs/local_models.yaml` defines how this machine finds and runs it

Z-Image:
  local_path: /inspire/qb-ilm/project/control-technology/public/models/Z-Image

Z-Image-Turbo:
  local_path: /inspire/qb-ilm/project/control-technology/public/models/Z-Image-Turbo

Wan2.2-T2V-A14B-Diffusers:
  repo_path: /inspire/qb-ilm/project/control-technology/25015/deps/Wan2.2
  weights_path: /inspire/qb-ilm/project/control-technology/public/models/Wan2.2-T2V-A14B-Diffusers
  max_gpus:

CogVideoX-5B:
  weights_path: /inspire/qb-ilm/project/control-technology/public/models/CogVideoX-5B

LongCat-Video:
  repo_path:
  weights_path:
  hf_cache_dir:

