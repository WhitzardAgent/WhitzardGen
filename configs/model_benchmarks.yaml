benchmarks:
  Z-Image:
    modality: image
    benchmark_status: pending
    recommended_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 50
      guidance_scale: 4.0
    benchmark_notes:
      - Record single-GPU latency on the target cluster.
      - Validate persistent-worker batch throughput at preferred batch size 4.
  LongCat-Video:
    modality: video
    benchmark_status: pending
    recommended_defaults:
      width: 1280
      height: 720
      fps: 30
      num_frames: 121
      num_inference_steps: 50
      guidance_scale: 4.0
      use_distill: false
    benchmark_notes:
      - Compare quality and latency with lower num_frames and num_inference_steps.
      - Record whether use_distill materially improves throughput.
  Helios:
    modality: video
    benchmark_status: pending
    recommended_defaults:
      width: 640
      height: 384
      fps: 24
      num_frames: 240
      num_inference_steps: 6
      guidance_scale: 1.0
      pyramid_num_inference_steps_list:
        - 2
        - 2
        - 2
      is_amplify_first_chunk: true
    benchmark_notes:
      - Validate whether 240-frame defaults are practical on the target GPUs.
      - Measure true progress callback smoothness in long runs.
  Wan2.2-T2V-A14B-Diffusers:
    modality: video
    benchmark_status: pending
    recommended_defaults:
      width: 1280
      height: 720
      fps: 16
      num_frames: 81
      num_inference_steps: 40
      guidance_scale: 4.0
      guidance_scale_2: 3.0
    benchmark_notes:
      - Validate startup reliability under persistent-worker reuse.
      - Record multi-replica scaling behavior.
  CogVideoX-5B:
    modality: video
    benchmark_status: pending
    recommended_defaults:
      width: 720
      height: 480
      fps: 8
      num_frames: 49
      num_inference_steps: 50
      guidance_scale: 6.0
    benchmark_notes:
      - Record best replica count before throughput flattens.
      - Compare low-frame canary speed against default run settings.
  Qwen3-32B:
    modality: text
    benchmark_status: pending
    recommended_defaults:
      max_new_tokens: 4096
      temperature: 0.6
      top_p: 0.95
      do_sample: true
      repetition_penalty: 1.0
      enable_thinking: true
    benchmark_notes:
      - Measure prompt-synthesis latency with batch sizes 1, 2, 4, and 8.
      - Record practical GPUs-per-replica requirements for stable prompt-generation throughput.
