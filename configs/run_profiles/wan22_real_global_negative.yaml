name: wan22_real_global_negative

models:
  - Wan2.2-T2V-A14B-Diffusers

prompts: prompts/test_video_100.txt
execution_mode: real

global_negative_prompt: "色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走，西方人"

generation_defaults:
  width: 1280
  height: 720
  fps: 16
  num_frames: 81
  guidance_scale: 4.0
  guidance_scale_2: 3.0
  num_inference_steps: 40

runtime:
  available_gpus: [0, 1, 2, 3]
