models:
  FLUX.1-dev:
    version: "1.0"
    adapter: FluxImageAdapter
    modality: image
    task_type: t2i
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 4
      preferred_batch_size: 2
      supports_negative_prompt: false
      supports_seed: true
      output_types: [image]
      supported_languages: [en]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 32
      env_spec: flux_image
    generation_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 50
      guidance_scale: 3.5
      max_sequence_length: 512
    weights:
      hf_repo: black-forest-labs/FLUX.1-dev

  stable-diffusion-xl-base-1.0:
    version: "1.0"
    adapter: StableDiffusionXLAdapter
    modality: image
    task_type: t2i
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 4
      preferred_batch_size: 2
      supports_negative_prompt: true
      supports_seed: true
      output_types: [image]
      supported_languages: [en]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 16
      recommended_vram_gb: 24
      env_spec: sdxl_image
    generation_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 40
      guidance_scale: 5.0
    weights:
      hf_repo: stabilityai/stable-diffusion-xl-base-1.0

  Qwen-Image-2512:
    version: "2512"
    adapter: QwenImageAdapter
    modality: image
    task_type: t2i
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 4
      preferred_batch_size: 2
      supports_negative_prompt: true
      supports_seed: true
      output_types: [image]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 32
      env_spec: qwen_image
    generation_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 50
      guidance_scale: 4.0
    weights:
      hf_repo: Qwen/Qwen-Image-2512

  Z-Image-Turbo:
    version: "1.0"
    adapter: ZImageTurboAdapter
    modality: image
    task_type: t2i
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 8
      preferred_batch_size: 4
      supports_negative_prompt: false
      supports_seed: true
      output_types: [image]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 16
      recommended_vram_gb: 24
      env_spec: zimage
      worker_strategy: persistent_worker
      gpus_per_replica: 1
      supports_multi_replica: true
    generation_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 9
      guidance_scale: 0.0
    weights:
      hf_repo: Tongyi-MAI/Z-Image-Turbo

  Z-Image:
    version: "1.0"
    adapter: ZImageAdapter
    modality: image
    task_type: t2i
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 8
      preferred_batch_size: 4
      supports_negative_prompt: true
      supports_seed: true
      output_types: [image]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 16
      recommended_vram_gb: 24
      env_spec: zimage
      worker_strategy: persistent_worker
      gpus_per_replica: 1
      supports_multi_replica: true
    generation_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 50
      guidance_scale: 4.0
      cfg_normalization: false
    weights:
      hf_repo: Tongyi-MAI/Z-Image

  HunyuanImage-3.0:
    version: "3.0"
    adapter: HunyuanImageAdapter
    modality: image
    task_type: t2i
    capabilities:
      supports_batch_prompts: false
      max_batch_size: 1
      preferred_batch_size: 1
      supports_negative_prompt: false
      supports_seed: true
      output_types: [image]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 48
      recommended_vram_gb: 80
      env_spec: hunyuan_image
    generation_defaults:
      width: 1024
      height: 1024
      num_inference_steps: 50
      guidance_scale: 1.0
      stream: true
      attn_implementation: sdpa
      moe_impl: eager
    weights:
      hf_repo: tencent/HunyuanImage-3.0
      local_dir_hint: Rename download directory to HunyuanImage-3 to avoid dots in local path loading.
