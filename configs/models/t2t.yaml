      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 80
      env_spec: zimage
      worker_strategy: persistent_worker
      gpus_per_replica: 1
      supports_multi_replica: true
    generation_defaults:
      max_new_tokens: 4096
      temperature: 0.6
      top_p: 0.95
      do_sample: true
      repetition_penalty: 1.0
      enable_thinking: true
    weights:
