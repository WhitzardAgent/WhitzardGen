models:
  Qwen2.5-32B-Instruct:
    version: "32B"
    adapter: Qwen25InstructTextAdapter
    modality: text
    task_type: t2t
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 32
      preferred_batch_size: 4
      supports_negative_prompt: false
      supports_seed: false
      output_types: [text]
      supported_languages: [en, zh]
      supports_structured_json_output: true
      accepted_annotation_source_artifact_types: [text, image, video, audio]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 80
      env_spec: zimage
      worker_strategy: persistent_worker
      gpus_per_replica: 1
      supports_multi_replica: true
    generation_defaults:
      max_new_tokens: 512
      temperature: 0.7
      top_p: 0.8
      do_sample: true
      repetition_penalty: 1.0
      system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."
    weights:
      hf_repo: Qwen/Qwen2.5-32B-Instruct
  Qwen3-32B:
