models:
  Qwen3-32B:
    version: "32B"
    adapter: Qwen3TextAdapter
    modality: text
    task_type: t2t
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 8
      preferred_batch_size: 4
      supports_negative_prompt: false
      supports_seed: false
      output_types: [text]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 80
      env_spec: zimage
      worker_strategy: persistent_worker
      gpus_per_replica: 4
      supports_multi_replica: true
    generation_defaults:
      max_new_tokens: 4096
      temperature: 0.6
      top_p: 0.95
      do_sample: true
      repetition_penalty: 1.0
      enable_thinking: true
    weights:
      hf_repo: Qwen/Qwen3-32B
