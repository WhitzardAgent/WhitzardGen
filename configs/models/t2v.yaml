models:
  LongCat-Video:
    version: "1.0"
    adapter: LongCatVideoAdapter
    modality: video
    task_type: t2v
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 2
      preferred_batch_size: 2
      supports_negative_prompt: true
      supports_seed: true
      output_types: [video]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 48
      env_spec: longcat_video
      worker_strategy: persistent_worker
      gpus_per_replica: 1
      supports_multi_replica: true
    generation_defaults:
      width: 1280
      height: 720
      fps: 30
      num_frames: 121
      num_inference_steps: 50
      guidance_scale: 4.0
      use_distill: false
    weights:
      hf_repo: meituan-longcat/LongCat-Video

  Helios:
    version: distilled
    adapter: HeliosPyramidAdapter
    modality: video
    task_type: t2v
    capabilities:
      supports_batch_prompts: true
      max_batch_size: 2
      preferred_batch_size: 2
      supports_negative_prompt: true
      supports_seed: true
      output_types: [video]
      supported_languages: [en, zh]
    runtime:
      execution_mode: in_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 48
      env_spec: zimage
      worker_strategy: persistent_worker
      gpus_per_replica: 1
      supports_multi_replica: true
    generation_defaults:
      width: 640
      height: 384
      fps: 24
      num_frames: 240
      num_inference_steps: 6
      guidance_scale: 1.0
      pyramid_num_inference_steps_list: [2, 2, 2]
      is_amplify_first_chunk: true
    weights:
      hf_repo: BestWishYsh/Helios-Distilled

  Wan2.2-TI2V-5B:
