      preferred_batch_size: 1
      supports_negative_prompt: false
      supports_seed: true
      output_types: [video]
      supported_languages: [en, zh]
    runtime:
      execution_mode: external_process
      gpu_required: true
      min_vram_gb: 24
      recommended_vram_gb: 48
      env_spec: wan_ti2v
    generation_defaults:
      width: 1280
